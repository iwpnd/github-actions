name: build-and-push
on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  tag-and-release:
    runs-on: mp-gha
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: tag and release
        id: tag-and-release
        uses: ./actions/tag-and-release
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # this will maintain @v1 tag with the latest minor and patch updates
      # so consumers of the any of our actions can use the generic @v1 tag
      # as oppossed to update with every patch.
      - name: update major version tag
        if: steps.tag-and-release.outputs.new_release_published == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const majorVersion = '${{ steps.tag-and-release.outputs.new_release_major_version }}';
            const tagName = `v${majorVersion}`;
            const sha = '${{ steps.tag-and-release.outputs.new_release_git_head }}';

            try {
              // Try to update existing ref
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`,
                sha: sha,
                force: true
              });
              console.log(`Updated tag ${tagName} to ${sha}`);
            } catch (error) {
              if (error.status === 404 || error.status === 422) {
                // Tag doesn't exist, create it
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/tags/${tagName}`,
                  sha: sha
                });
                console.log(`Created tag ${tagName} at ${sha}`);
              } else {
                throw error;
              }
            }
